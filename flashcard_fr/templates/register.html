{% extends "layout.html" %}

{% block title %}Register - Flashcards{% endblock %}

{% block main %}
<div class="flex items-center justify-center bg-midnight mt-20">
  <div class="relative z-10 w-full max-w-sm bg-charcoal rounded-3xl shadow-2xl overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-accent-purple via-purple-500 to-accent-purple"></div>
    <div class="p-8">
      <h2 class="text-3xl font-heading text-center text-text-light mb-6">Register</h2>

      <form method="POST" action="" class="space-y-5">
        <div class="max-w-md mx-auto">
          <label for="username" class="block text-sm font-medium text-text-light">Username</label>
          <input
            id="username" name="username" type="text" placeholder="Please enter username" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>

        <div class="max-w-md mx-auto">
          <label for="Email" class="block text-sm font-medium text-text-light">Email</label>
          <input
            id="email" name="email" type="email" placeholder="Please enter email" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>

        <div class="max-w-md mx-auto">
          <label for="native_language" class="block text-sm font-medium text-text-light mb-2">Native Language</label>
          <select id="native_language" name="native_language" required class="mt-1 block w-full bg-velvet-black border border-charcoal rounded-2xl p-3 text-center text-sm text-text-light font-body focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition">
            {% for region, langs in languages_by_region.items() %}
              <optgroup label="{{ region }}" data-region="{{ region }}">
                {% for code, lang in langs.items() %}
                  <option value="{{ code }}">{{ lang }}{{ code }}</option>
                {% endfor %}
              </optgroup>
            {% endfor %}
          </select>
        </div>

        <div class="max-w-md mx-auto">
          <label for="password" class="block text-sm font-medium text-text-light">Password</label>
          <input
            id="password" name="password" type="password" placeholder="Please enter password" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>

        <div class="max-w-md mx-auto">
          <label for="confirmation_password" class="block text-sm font-medium text-text-light">Password</label>
          <input
            id="confirmation_password" name="confirmation_password" type="password" placeholder="Please confirm password" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>
        <div class="flex items-center justify-center">
          <button type="submit"
          class="mt-8 group relative flex items-center justify-center gap-2 px-8 py-3 
          text-sm font-black uppercase tracking-widest transition-all duration-300 
          bg-purple-600/10 border-2 border-purple-500/30 rounded-xl text-purple-500
          hover:bg-purple-600/20 hover:border-purple-500/60 
          hover:shadow-[0_0_25px_rgba(147,51,234,0.2)] active:scale-95">
      
          <span>Sign Up</span>
                                  
          <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1" 
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
          </button>
        </div>
      </form>

      <p class="mt-6 text-center text-text-light text-sm">
        Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-accent-purple hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

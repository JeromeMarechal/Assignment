                     <!-- Auth links inside the same dropdown on mobile -->
        <div class="border-t border-charcoal pt-4 mt-4 md:mt-0 md:pt-0 md:border-0 md:hidden space-y-2">

        <a href="{{ url_for('auth.logout') }}" class="hover:text-accent-purple">Logout</a>
      {% else %}
        <a href="{{ url_for('auth.login') }}"    class="hover:text-accent-purple">Login</a>

<script>
// Simple toggle for mobile menu
document.getElementById('nav-toggle').addEventListener('click', () => {
  const menu = document.getElementById('nav-menu');
  menu.classList.toggle('hidden');
});
</script>

{% extends 'layout.html' %}

{% block title %} Search - Flashcards {% endblock %}

{% block main %}
  <div class="flex flex-col items-center justify-center min-h-screen bg-midnight">
    <div class=" relative z-10 w-full max-w-sm bg-charcoal rounded-3xl shadow-2xl overflow-hidden">
      <div class="p-8 flex items-center justify-center flex-col">
        <h2 class="text-3xl font-heading text-center text-text-light mb-6">Create Your Card</h2>

        <form method="POST" action="" class="space-y-5">

          <fieldset>
            <legend class="block text-sm font-medium text-center text-text-light mb-4">Choose a region</legend>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="europe" class="accent-indigo-600">
              <span>Europe</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="asia" class="accent-indigo-600">
              <span>Asia</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="africa" class="accent-indigo-600">
              <span>Africa</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="americas" class="accent-indigo-600">
              <span>Americas</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="middle east" class="accent-indigo-600">
              <span>Middle East</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border px-3 py-2 cursor-pointer">
              <input type="radio" name="region" value="oceania" class="accent-indigo-600">
              <span>Oceania</span>
              </label>
            </div>
          </fieldset>  

          <div class="max-w-md mx-auto">
            <label for="lang" class="block text-sm font-medium text-center text-text-light mb-2">Source Language</label>
            <select id="lang" name="lang" required class="mt-1 block w-full bg-velvet-black border border-charcoal rounded-2xl p-3 text-center text-sm text-text-light font-body focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition">
              <option value="{{ native_language_code }}">{{ native_language_text }}</option>
              {% for region, langs in languages_by_region.items() %}
                <optgroup label="{{ region }}" data-region="{{ region | lower }}">
                  {% for code, lang in langs.items() %}
                    <option value="{{ code }}">{{ lang }}</option>
                  {% endfor %}
                </optgroup>
              {% endfor %}
            </select>
          </div>

          <div>
            <label for="word" class="block text-sm font-medium text-center text-text-light">Word</label>
            <input id="word" name="word" type="text" placeholder="Please search for a word" required class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-center text-text-light focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition" />
          </div>
          <div class="flex justify-center">
            <button type="submit" 
                    class="mt-8 group relative flex items-center justify-center gap-2 px-8 py-3 
                    text-sm font-black uppercase tracking-widest transition-all duration-300 
                    bg-purple-600/10 border-2 border-purple-500/30 rounded-xl text-purple-500
                    hover:bg-purple-600/20 hover:border-purple-500/60 
                    hover:shadow-[0_0_25px_rgba(147,51,234,0.2)] active:scale-95">
                
                <span>Search</span>
                                        
                <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1" 
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
            </button>
          </div>
        </form>
      </div>
    </div>

  <script>
    // grab all region radios
    const regionRadios = document.querySelectorAll('input[name="region"]');
    // grab all optgroups inside the select
    const optgroups = document.querySelectorAll('#lang optgroup');

    // helper to show only the selected region's optgroup
    function showRegion(region) {
      optgroups.forEach(group => {
        const match = group.getAttribute('data-region') === region;
        // hide/show the optgroup and its options
        group.hidden = !match;
      });
    }

    // listen for region changes
    regionRadios.forEach(radio => {
      radio.addEventListener('change', function () {
        showRegion(this.value);
      });
    });
  </script>
{% endblock %}

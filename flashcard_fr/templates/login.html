{% extends "layout.html" %}

{% block title %}Log In – Flashcards{% endblock %}

{% block main %}
<div class="flex items-center justify-center bg-midnight mt-20">
  <div class="relative z-10 w-full max-w-sm bg-charcoal rounded-3xl shadow-2xl overflow-hidden">
    <div class="h-1 bg-gradient-to-r from-accent-purple via-purple-500 to-accent-purple"></div>
    <div class="p-8">
      <h2 class="text-3xl font-heading text-center text-text-light mb-6">Welcome Back</h2>

      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-text-light">Username</label>
          <input
            id="username" name="username" type="text" placeholder="Please enter username or email" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-text-light">Password</label>
          <input
            id="password" name="password" type="password" placeholder="Please enter password" required
            class="mt-1 block w-full bg-velvet-black border border-accent-gray rounded-xl p-3 text-text-light
                   focus:outline-none focus:ring-2 focus:ring-accent-purple focus:border-transparent transition"
          />
        </div>
        <div class="flex items-center justify-center">
          <button type="submit"
          class="mt-8 group relative flex items-center justify-center gap-2 px-8 py-3 
          text-sm font-black uppercase tracking-widest transition-all duration-300 
          bg-purple-600/10 border-2 border-purple-500/30 rounded-xl text-purple-500
          hover:bg-purple-600/20 hover:border-purple-500/60 
          hover:shadow-[0_0_25px_rgba(147,51,234,0.2)] active:scale-95">
      
          <span>Log In</span>
                                  
          <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1" 
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
          </button>
        </div>
      </form>

      <p class="mt-6 text-center text-text-light text-sm">
        Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-accent-purple hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
